<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quy Định Bệnh Viện - Hospital Regulations</title>
    <link rel="icon" type="image/svg+xml" href="./logo-cms.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Momo+Signature&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-teal: #93A4C1;
            --accent-coral: #E8725D;
            --dark-navy: #0D2238;
            --soft-cream: #F9F5F0;
            --light-blue: #E3F2F7;
            --warning-red: #C84B31;
            --success-green: #2D6A4F;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, var(--soft-cream) 0%, var(--light-blue) 100%);
            color: var(--dark-navy);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ── INTRO ── */
        #intro-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #93A4C1);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(6px);
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #intro-overlay.hidden { opacity: 0; visibility: hidden; }
        #tsparticles { position: absolute; inset: 0; z-index: 0; }
        .intro-content { position: relative; z-index: 2; text-align: center; color: white; }
        .logo-wrapper { position: relative; width: 240px; height: 240px; margin: 0 auto 1.5rem; }
        .logo { position: absolute; width: 160px; height: 160px; border-radius: 50%; object-fit: cover; }
        .logo.main { left: 0; top: 20px; background: black; z-index: 2; animation: floatMain 2s ease-in-out infinite; }
        .logo.sub  { background-color: white; right: 0; bottom: 0; opacity: 0.7; animation: floatSub 2s ease-in-out infinite reverse; }
        .intro-title {
            font-size: 2.2rem; font-family: 'Playfair Display', serif; font-weight: 900;
            background: black; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; animation: fadeUp 1.2s ease;
        }
        .intro-sub { font-family: "Indie Flower", cursive; opacity: 0.8; margin-top: 0.3rem; animation: fadeUp 1.5s ease; }
        .loader { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 1.5rem auto 0; overflow: hidden; }
        .loader-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #fff, #0F4C81); animation: loading 2s ease forwards; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, var(--primary-teal) 75%, var(--soft-cream) 100%);
            padding: 3.5rem 2rem 4rem; text-align: center;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 40px rgba(10,110,124,0.3);
        }
        .header::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px; animation: drift 20s linear infinite;
        }
        .header h1 {
            font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900;
            color: white; text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
            margin-bottom: 0.5rem; position: relative; z-index: 2; letter-spacing: -1px;
        }
        .header .subtitle {
            font-size: 1.1rem; color: var(--light-blue); font-weight: 300;
            position: relative; z-index: 2; letter-spacing: 2px; text-transform: uppercase;
        }

        /* ── NAV ── */
        .nav-container { max-width: 1400px; margin: -2rem auto 0; padding: 0 2rem; position: relative; z-index: 10; }
        .nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .nav-btn {
            background: white; border: none; padding: 1.5rem 1rem; border-radius: 15px;
            cursor: pointer; font-family: 'Work Sans', sans-serif; font-size: 0.95rem;
            font-weight: 600; color: var(--dark-navy);
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            position: relative; overflow: hidden; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .nav-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(10,110,124,0.1), transparent);
            transition: left 0.5s;
        }
        .nav-btn:hover::before { left: 100%; }
        .nav-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(10,110,124,0.2); color: var(--primary-teal); }
        .nav-btn.active {
            border: 2px solid white;
            background: linear-gradient(135deg, var(--primary-teal) 75%, var(--soft-cream) 100%);
            color: white; box-shadow: 0 10px 30px rgba(10,110,124,0.4);
            -webkit-tap-highlight-color: transparent;
        }

        /* ── SECTIONS ── */
        .content-section { display: none; animation: fadeIn 0.6s ease-in; }
        .content-section.active { display: block; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; }

        /* ── SECTION HEADER ── */
        .section-header {
            background: white; padding: 2.5rem; border-radius: 20px;
            margin-bottom: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-left: 8px solid var(--primary-teal);
        }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--primary-teal); margin-bottom: 0.5rem; font-weight: 900; }
        .section-header p { color: var(--dark-navy); opacity: 0.7; font-size: 1.05rem; }

        /* ── CARD ── */
        .card {
            background: white; padding: 2rem; border-radius: 15px;
            margin-bottom: 1.5rem; box-shadow: 0 5px 25px rgba(0,0,0,0.06);
            transition: all 0.3s ease; border-left: 4px solid var(--light-blue);
        }
        .card:hover { transform: translateX(8px); box-shadow: 0 8px 35px rgba(10,110,124,0.15); border-left-color: var(--primary-teal); }
        .card h3 { font-family: 'Playfair Display', serif; color: var(--primary-teal); font-size: 1.5rem; margin-bottom: 1rem; font-weight: 700; }
        .card h4.group-heading { color: var(--primary-teal); margin: 1.5rem 0 1rem; font-size: 1.2rem; }

        /* ── REGULATION ITEM ── */
        .regulation-item { padding: 1rem 0; border-bottom: 1px solid var(--light-blue); display: flex; gap: 1rem; }
        .regulation-item:last-child { border-bottom: none; }
        .regulation-number { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--accent-coral); min-width: 40px; line-height: 1; }
        .regulation-content { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .penalty { width: fit-content; background: linear-gradient(135deg, #FFF5F5, #FFE5E5); padding: 0.5rem 1rem; border-radius: 8px; color: var(--warning-red); font-weight: 600; margin-top: 0.5rem; display: inline-block; font-size: 0.9rem; white-space: pre-line; }
        .benefit { background: linear-gradient(135deg, #F0FFF4, #E5FFE9); padding: 0.5rem 1rem; border-radius: 8px; color: var(--success-green); font-weight: 600; margin-top: 0.5rem; display: inline-block; font-size: 0.9rem; white-space: pre-line; }

        /* ── TABLE ── */
        .table-container { overflow-x: auto; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.06); margin-bottom: 2rem; }
        .table-container h3 { margin-bottom: 1.5rem; color: var(--primary-teal); font-family: 'Playfair Display', serif; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.95rem; }
        thead { background: linear-gradient(135deg, var(--primary-teal), var(--dark-navy)); color: white; }
        th { padding: 1.2rem; text-align: left; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-size: 0.85rem; }
        th:first-child { border-radius: 10px 0 0 0; } th:last-child { border-radius: 0 10px 0 0; }
        td { padding: 1.2rem; border-bottom: 1px solid var(--light-blue); }
        tbody tr { transition: background 0.3s; }
        tbody tr:hover { background: var(--soft-cream); }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:last-child td:first-child { border-radius: 0 0 0 10px; }
        tbody tr:last-child td:last-child { border-radius: 0 0 10px 0; }

        /* ── HIGHLIGHT BOX ── */
        .highlight-box { background: linear-gradient(135deg, var(--light-blue), white); padding: 2rem; border-radius: 15px; border: 2px solid var(--primary-teal); margin: 2rem 0; }
        .highlight-box h4 { font-family: 'Playfair Display', serif; color: var(--primary-teal); font-size: 1.4rem; margin-bottom: 1rem; font-weight: 700; }
        .highlight-box-inner { padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; }

        /* ── GRID ── */
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin: 2rem 0; }

        /* ── LISTS ── */
        ul { list-style: none; padding-left: 0; }
        ul li { padding: 0.5rem 0 0.5rem 1.5rem; position: relative; }
        ul li::before { content: '▸'; position: absolute; left: 0; color: var(--accent-coral); font-weight: bold; }

        /* ── FOOTER ── */
        .footer { background: var(--dark-navy); color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
        .footer p { opacity: 0.8; }

        /* ── ANIMATIONS ── */
        @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes floatMain { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px) scale(1.05)} }
        @keyframes floatSub  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(10px)  scale(0.95)} }
        @keyframes fadeUp    { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes loading   { to{width:100%} }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.2rem; }
            .nav { grid-template-columns: 1fr; }
            .section-header h2 { font-size: 2rem; }
            table { font-size: 0.85rem; }
            th, td { padding: 0.8rem; }
        }
    </style>
</head>
<body>

<!-- INTRO -->
<div id="intro-overlay">
    <div id="tsparticles"></div>
    <div class="intro-content">
        <div class="logo-wrapper">
            <img src="./server_logo.png" class="logo main">
            <img src="./ems_partner_logo.png" class="logo sub">
        </div>
        <h2 class="intro-title" id="intro-title"></h2>
        <p class="intro-sub" id="intro-sub"></p>
        <div class="loader"><div class="loader-bar"></div></div>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1 id="main-title"></h1>
    <p class="subtitle" id="main-subtitle"></p>
</div>

<!-- NAV -->
<div class="nav-container">
    <div class="nav" id="nav-buttons"></div>
</div>

<!-- DYNAMIC SECTIONS -->
<div class="container" id="sections-container"></div>

<!-- FOOTER -->
<div class="footer">
    <p id="footer-text"></p>
    <p id="footer-note" style="margin-top:0.5rem;font-size:0.9rem;"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>
<script>
/* ─────────────────────────────────────────────
   RENDERER HELPERS
───────────────────────────────────────────── */

function renderPenalty(text, type) {
    if (!text) return '';
    return `<div class="${type}">${text}</div>`;
}

function renderList(items) {
    if (!items || !items.length) return '';
    return `<ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
}

function renderRegulationList(items) {
    return items.map(item => `
        <div class="regulation-item">
            <div class="regulation-number">${item.number}</div>
            <div class="regulation-content">
                ${item.content}
                ${item.list ? renderList(item.list) : ''}
                ${item.penalty ? renderPenalty(item.penalty, item.penaltyType || 'penalty') : ''}
            </div>
        </div>
    `).join('');
}

function renderCard(card) {
    let body = '';

    if (card.type === 'regulation-list') {
        body = renderRegulationList(card.items);

    } else if (card.type === 'grouped-list') {
        body = card.groups.map(g => `
            <h4 class="group-heading">${g.heading}</h4>
            ${renderList(g.list)}
        `).join('');

    } else if (card.type === 'simple-list') {
        body = renderList(card.list);

    } else if (card.type === 'highlight-list') {
        body = card.items.map(item => `
            <div class="highlight-box" style="margin:1.5rem 0;">
                <h4>${item.title}</h4>
                <p>${item.content}</p>
            </div>
        `).join('');
    }

    return `
        <div class="card">
            <h3>${card.title}</h3>
            ${body}
        </div>
    `;
}

function renderHighlight(h) {
    let inner = '';
    if (h.list) inner += renderList(h.list);
    if (h.badges) {
        inner += `<div style="margin-top:1rem;">` +
            h.badges.map(b => `<div class="highlight-box-inner" style="background:${b.color};margin-bottom:0.5rem;"><strong>${b.text}</strong></div>`).join('') +
            `</div>`;
    }
    if (!h.list && !h.badges) inner = `<p>${h.content}</p>`;
    else inner = `<p>${h.content}</p>` + inner;

    return `
        <div class="highlight-box">
            <h4>${h.title}</h4>
            ${inner}
        </div>
    `;
}

function renderTable(t) {
    const colCount = t.columns.length;
    const thead = `<tr>${t.columns.map((c,i) => `<th>${c}</th>`).join('')}</tr>`;
    const tbody = t.rows.map(row =>
        `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`
    ).join('');

    return `
        <div class="table-container">
            <h3>${t.title}</h3>
            <table>
                <thead>${thead}</thead>
                <tbody>${tbody}</tbody>
            </table>
        </div>
    `;
}

function renderSection(section) {
    let html = `
        <div id="${section.id}" class="content-section">
            <div class="section-header">
                <h2>${section.header.title}</h2>
                <p>${section.header.description}</p>
            </div>
    `;

    // Grid (2-column cards)
    if (section.grid && section.grid.length) {
        html += `<div class="grid-2">`;
        section.grid.forEach(g => {
            html += `<div class="card"><h3>${g.title}</h3>${renderList(g.list)}</div>`;
        });
        html += `</div>`;
    }

    // Tables
    if (section.tables && section.tables.length) {
        section.tables.forEach(t => { html += renderTable(t); });
    }

    // Cards
    if (section.cards && section.cards.length) {
        section.cards.forEach(card => { html += renderCard(card); });
    }

    // Highlights
    if (section.highlights && section.highlights.length) {
        section.highlights.forEach(h => { html += renderHighlight(h); });
    }

    html += `</div>`;
    return html;
}

/* ─────────────────────────────────────────────
   BOOT: LOAD JSON → BUILD DOM
───────────────────────────────────────────── */
fetch('./content.json')
    .then(r => r.json())
    .then(data => {
        // Meta
        document.title = data.meta.title;
        document.getElementById('intro-title').textContent   = data.meta.intro.title;
        document.getElementById('intro-sub').textContent     = data.meta.intro.subtitle;
        document.getElementById('main-title').textContent    = data.meta.title.toUpperCase();
        document.getElementById('main-subtitle').textContent = data.meta.subtitle;
        document.getElementById('footer-text').textContent   = data.meta.footer;
        document.getElementById('footer-note').textContent   = data.meta.footerNote;

        // Nav buttons
        const navEl = document.getElementById('nav-buttons');
        data.nav.forEach((item, idx) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn' + (idx === 0 ? ' active' : '');
            btn.textContent = item.label;
            btn.onclick = (e) => showSection(item.id, e.currentTarget);
            navEl.appendChild(btn);
        });

        // Sections
        const container = document.getElementById('sections-container');
        data.sections.forEach((section, idx) => {
            const html = renderSection(section);
            container.insertAdjacentHTML('beforeend', html);
            if (idx === 0) document.getElementById(section.id).classList.add('active');
        });
    })
    .catch(err => console.error('Failed to load content.json:', err));

/* ─────────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────────── */
function showSection(sectionId, clickedBtn) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
    if (clickedBtn) clickedBtn.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ─────────────────────────────────────────────
   PARTICLES + INTRO
───────────────────────────────────────────── */
tsParticles.load("tsparticles", {
    background: { color: "transparent" },
    fpsLimit: 60,
    particles: {
        number: { value: 70 },
        color: { value: "#ffffff" },
        links: { enable: true, color: "#4facfe", distance: 120, opacity: 0.3, width: 1 },
        move: { enable: true, speed: 1.2 },
        opacity: { value: 0.5 },
        size: { value: { min: 1, max: 3 } }
    },
    interactivity: {
        events: { onHover: { enable: true, mode: "grab" } },
        modes: { grab: { distance: 140, links: { opacity: 0.6 } } }
    }
});

window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('intro-overlay').classList.add('hidden');
    }, 10000);
});
</script>
</body>
</html>
